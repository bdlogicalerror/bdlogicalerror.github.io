<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahmudul Hasan - Windows XP Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ============================================
           AUTHENTIC WINDOWS XP LUNA THEME
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        :root {
            --xp-blue: #245DDA;
            --xp-taskbar: linear-gradient(180deg, #316AC5 0%, #245DDA 50%, #1A4AC0 100%);
            --xp-selection: #316AC5;
            --xp-bg: #ECE9D8;
            --xp-start: linear-gradient(180deg, #4CAF50 0%, #388E3C 50%, #2E7D32 100%);
        }
        body { font-family: 'Tahoma', 'Segoe UI', sans-serif; font-size: 11px; overflow: hidden; background: #000; height: 100vh; width: 100vw; }

        /* ============================================
           BOOT & LOADING
           ============================================ */
        #boot-sequence { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #boot-sequence.hidden { display: none; }
        #bios-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #245DDA; font-family: 'Courier New', monospace; font-size: 14px; padding: 30px; line-height: 1.6; }
        .bios-line { opacity: 0; animation: biosFadeIn 0.05s forwards; }
        @keyframes biosFadeIn { to { opacity: 1; } }
        #xp-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #xp-loading-bar-container { width: 250px; height: 15px; border: 2px solid #666; padding: 2px; border-radius: 3px; }
        #xp-loading-bar { height: 100%; background: linear-gradient(90deg, #316AC5, #5A9CFF, #316AC5); width: 0%; transition: width 0.1s; }

        /* ============================================
           WELCOME SCREEN
           ============================================ */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #003399 0%, #000066 100%);
            display: none; align-items: center; z-index: 999998;
        }
        .welcome-bar { width: 100%; height: 140px; background: #5a7edc; border-top: 2px solid #fff; border-bottom: 2px solid #fff; display: flex; align-items: center; justify-content: center; }
        .welcome-msg { color: #fff; font-size: 32px; font-weight: bold; margin-left: 30px; font-style: italic; }

        /* ============================================
           DESKTOP & TASKBAR
           ============================================ */
        #desktop-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #desktop { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; 
            background: url('https://e0.pxfuel.com/wallpapers/139/189/desktop-wallpaper-windows-xp-bliss-original-original-windows-xp-bliss.jpg') no-repeat center center;
            background-size: cover; 
        }
        .desktop-icons { position: absolute; width: 100%; height: calc(100% - 40px); }
        .desktop-icon { position: absolute; width: 80px; text-align: center; cursor: pointer; color: #fff; text-shadow: 1px 1px 2px #000; padding: 5px; }
        .desktop-icon:hover { background: rgba(255,255,255,0.15); border: 1px dotted #fff; }

        #taskbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 35px; background: var(--xp-taskbar); z-index: 10000; display: flex; align-items: center; border-top: 1px solid #5A9CFF; padding-right: 5px; }
        #start-button { display: flex; align-items: center; gap: 5px; padding: 3px 12px; background: var(--xp-start); border: 2px outset #8BC34A; cursor: pointer; color: #fff; font-weight: bold; font-style: italic; border-radius: 0 10px 10px 0; box-shadow: inset 2px 2px 3px rgba(255,255,255,0.4); }
        #taskbar-windows { flex: 1; display: flex; gap: 3px; margin-left: 10px; overflow: hidden; }
        .task-tab { padding: 4px 10px; background: #5A7AD5; border: 1px outset #9BB6E8; color: #fff; min-width: 110px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-tab.active { background: #1A4AC0; border: 1px inset #5A9CFF; }
        #clock { color: #fff; padding: 0 15px; font-weight: bold; }

        /* ============================================
           START MENU
           ============================================ */
        #start-menu { 
            position: absolute; bottom: 35px; left: 0; width: 380px; background: #fff; 
            border: 2px solid #245DDA; border-radius: 5px 5px 0 0; z-index: 10001; display: none;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.5);
        }
        .start-header { background: linear-gradient(to bottom, #1A4AC0, #245DDA); padding: 8px 12px; display: flex; align-items: center; gap: 10px; color: #fff; font-weight: bold; }
        .start-body { display: flex; border-top: 1px solid #fff; }
        .start-left { width: 50%; padding: 5px; background: #fff; }
        .start-right { width: 50%; background: #D3E5FA; padding: 5px; border-left: 1px solid #9BB6E8; }
        .start-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px; cursor: pointer; color: #333; }
        .start-item:hover { background: #316AC5; color: #fff; }

        /* ============================================
           WINDOWS & CMD
           ============================================ */
        .window { position: absolute; background: var(--xp-bg); border: 3px outset #fff; box-shadow: 3px 3px 15px rgba(0,0,0,0.4); display: none; flex-direction: column; }
        .window.visible { display: flex; }
        .window-header { background: linear-gradient(to right, #245DDA, #1A4AC0); padding: 3px 6px; color: #fff; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: move; }
        .window-body { flex: 1; overflow: auto; background: #fff; position: relative; }
        .win-btn { width: 21px; height: 21px; background: var(--xp-bg); border: 1px outset #fff; cursor: pointer; font-weight: bold; color: #000; }
        .win-close { background: #E53935; color: #fff; }

        .cmd-container { background: #000 !important; color: #fff !important; font-family: 'Courier New', monospace; padding: 10px; height: 100%; overflow-y: auto; }
        .cmd-input-line { display: flex; align-items: center; }
        .cmd-input { background: transparent; border: none; color: #fff; font-family: inherit; font-size: inherit; outline: none; flex: 1; }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="boot-sequence">
        <div id="bios-screen"></div>
        <div id="xp-loading">
            <div style="color:white; font-size:28px; margin-bottom:20px; font-weight:bold; font-style:italic;">Windows XP</div>
            <div id="xp-loading-bar-container"><div id="xp-loading-bar"></div></div>
        </div>
    </div>

    <div id="welcome-screen">
        <div class="welcome-bar">
            <div style="font-size:50px; color:#fff; font-style:italic; opacity:0.7;">welcome</div>
            <div style="border-left:2px solid rgba(255,255,255,0.3); padding-left:30px; display:flex; align-items:center; gap:15px;">
                <div style="width:60px; height:60px; border:2px solid #fff; background:#4CAF50; border-radius:4px;"></div>
                <div class="welcome-msg">Mahmudul Hasan</div>
            </div>
        </div>
    </div>

    <div id="start-menu">
        <div class="start-header">
            <div style="width:34px; height:34px; background:#4CAF50; border:1px solid #fff;"></div>
            <span>Mahmudul Hasan</span>
        </div>
        <div class="start-body">
            <div class="start-left">
                <div class="start-item" onclick="openWindow('cmd')">📟 Command Prompt</div>
                <div class="start-item" onclick="openWindow('skills')">⚙️ Technical Skills</div>
                <div class="start-item" onclick="openWindow('projects')">📂 My Projects</div>
            </div>
            <div class="start-right">
                <div class="start-item" onclick="openWindow('about')">💻 My Computer</div>
                <div class="start-item" onclick="openWindow('contact')">📧 Contact Me</div>
                <div style="height:1px; background:#9BB6E8; margin:5px 0;"></div>
                <div class="start-item" onclick="location.reload()">🔒 Log Off</div>
            </div>
        </div>
    </div>

    <div id="desktop-container">
        <div id="three-container"></div>
        <div id="desktop" onclick="closeMenus()">
            <div class="desktop-icons" id="desktop-icons"></div>
        </div>
        <div id="taskbar">
            <div id="start-button" onclick="toggleStartMenu(event)"><span>start</span></div>
            <div id="taskbar-windows"></div>
            <div id="clock"></div>
        </div>
    </div>

    <div id="windows-container"></div>

    <script>
        // ============================================
        // DATA: APPS & SKILLS
        // ============================================
        const appList = {
            'about': { name: 'My Computer', icon: '💻', content: 'Senior Full-Stack Engineer | AI Specialist.<br><br>Focused on RAG, LLM Agents, and Scalable Mobile Architectures.' },
            'cmd': { name: 'Command Prompt', icon: '📟' },
            'skills': { name: 'Technical Skills', icon: '⚙️', content: '<b>AI:</b> LangChain, OpenAI, Vector DBs<br><b>Web:</b> Next.js 15, Laravel, FastAPI<br><b>Mobile:</b> Flutter Expert<br><b>DevOps:</b> Docker, AWS, CI/CD' },
            'projects': { name: 'My Projects', icon: '📂', content: '• Google Antigravity<br>• SpendWise Expense Tracker<br>• AI Automation Agents' },
            'contact': { name: 'Contact Info', icon: '📧', content: 'WhatsApp: +8801912409071<br>GitHub: bdlogicalerror' },
            'recycle': { name: 'Recycle Bin', icon: '🗑️', content: 'Legacy tech found: jQuery.js, IE6_Fix.css' }
        };

        let zIndex = 1000;
        let activeWindows = {};
        let focusedId = null;

        // ============================================
        // WINDOW MANAGEMENT
        // ============================================
        function openWindow(id) {
            toggleStartMenu(null, false);
            if (activeWindows[id]) { focusWindow(id); return; }

            const win = document.createElement('div');
            win.className = 'window visible';
            win.id = `win-${id}`;
            win.style.width = '480px';
            win.style.height = '350px';
            win.style.left = (100 + (Object.keys(activeWindows).length * 30)) + 'px';
            win.style.top = (80 + (Object.keys(activeWindows).length * 30)) + 'px';
            win.style.zIndex = ++zIndex;

            win.innerHTML = `
                <div class="window-header" onmousedown="drag(event, '${id}')">
                    <span>${appList[id].name}</span>
                    <div style="display:flex; gap:2px;">
                        <button class="win-btn" onclick="minimizeWin('${id}')">_</button>
                        <button class="win-btn win-close" onclick="closeWin('${id}')">X</button>
                    </div>
                </div>
                <div class="window-body" id="body-${id}">
                    ${id === 'cmd' ? createCmd() : `<div style="padding:15px;">${appList[id].content}</div>`}
                </div>
            `;

            document.getElementById('windows-container').appendChild(win);
            activeWindows[id] = win;
            updateTaskbar();
            focusWindow(id);
        }

        function createCmd() {
            return `
                <div class="cmd-container">
                    <div>Microsoft Windows XP [Version 5.1.2600]</div>
                    <div>(C) Copyright 1985-2001 Microsoft Corp.</div><br>
                    <div id="cmd-out"></div>
                    <div class="cmd-input-line">
                        <span>C:\\Documents and Settings\\Mahmudul></span>
                        <input type="text" class="cmd-input" id="cmd-input" autofocus onkeydown="runCmd(event)">
                    </div>
                </div>`;
        }

        function runCmd(e) {
            if (e.key === 'Enter') {
                const input = e.target.value.toLowerCase().trim();
                const out = document.getElementById('cmd-out');
                let resp = "";
                if (input === 'help') resp = "Commands: dir, whoami, systeminfo, ver, cls, exit";
                else if (input === 'dir') resp = "03/03/2026 10:30 AM <DIR> Projects\n03/03/2026 10:30 AM <DIR> Skills.exe";
                else if (input === 'whoami') resp = "Mahmudul Hasan - AI & Automation Engineer";
                else if (input === 'systeminfo') resp = "OS: Windows XP Pro\nCPU: M1 Apple Silicon\nMemory: 16GB";
                else if (input === 'cls') { out.innerHTML = ""; e.target.value = ""; return; }
                else if (input === 'exit') { closeWin('cmd'); return; }
                else resp = `'${input}' is not recognized.`;

                out.innerHTML += `<div>C:\\> ${e.target.value}</div><div>${resp}</div><br>`;
                e.target.value = "";
                e.target.parentElement.parentElement.scrollTop = 9999;
            }
        }

        function focusWindow(id) {
            focusedId = id;
            Object.values(activeWindows).forEach(w => w.style.zIndex = 1000);
            activeWindows[id].style.zIndex = ++zIndex;
            activeWindows[id].classList.add('visible');
            updateTaskbar();
        }

        function minimizeWin(id) {
            activeWindows[id].classList.remove('visible');
            updateTaskbar();
        }

        function closeWin(id) {
            activeWindows[id].remove();
            delete activeWindows[id];
            updateTaskbar();
        }

        function updateTaskbar() {
            const container = document.getElementById('taskbar-windows');
            container.innerHTML = '';
            Object.keys(activeWindows).forEach(id => {
                const tab = document.createElement('div');
                tab.className = `task-tab ${focusedId === id ? 'active' : ''}`;
                tab.innerText = appList[id].name;
                tab.onclick = () => focusWindow(id);
                container.appendChild(tab);
            });
        }

        // ============================================
        // DESKTOP & BOOT
        // ============================================
        function shuffleIcons() {
            const container = document.getElementById('desktop-icons');
            const icons = Object.keys(appList);
            icons.forEach(id => {
                const div = document.createElement('div');
                div.className = 'desktop-icon';
                div.innerHTML = `<div style="font-size:32px">${appList[id].icon}</div><div>${appList[id].name}</div>`;
                div.style.left = Math.random() * (window.innerWidth - 150) + 50 + 'px';
                div.style.top = Math.random() * (window.innerHeight - 150) + 50 + 'px';
                div.ondblclick = () => openWindow(id);
                container.appendChild(div);
            });
        }

        async function runBoot() {
            const bios = document.getElementById('bios-screen');
            const text = ['PhoenixBIOS 4.0 Release 6.0', 'CPU: AMD Ryzen 9 5900X', 'Memory: 16384MB OK', 'Loading XP...'];
            for (let line of text) {
                const d = document.createElement('div'); d.className = 'bios-line'; d.innerText = line;
                bios.appendChild(d); await new Promise(r => setTimeout(r, 200));
            }
            document.getElementById('xp-loading').style.display = 'flex';
            const bar = document.getElementById('xp-loading-bar');
            for(let i=0; i<=100; i+=10) { bar.style.width = i+'%'; await new Promise(r => setTimeout(r, 100)); }
            document.getElementById('boot-sequence').style.display = 'none';
            const wel = document.getElementById('welcome-screen');
            wel.style.display = 'flex';
            setTimeout(() => wel.style.display = 'none', 2500);
        }

        function toggleStartMenu(e, force = null) {
            if (e) e.stopPropagation();
            const menu = document.getElementById('start-menu');
            menu.style.display = (force !== null) ? (force ? 'block' : 'none') : (menu.style.display === 'block' ? 'none' : 'block');
        }

        function closeMenus() { toggleStartMenu(null, false); }

        function drag(e, id) {
            const win = activeWindows[id]; focusWindow(id);
            let ox = e.clientX - win.offsetLeft, oy = e.clientY - win.offsetTop;
            function move(ev) { win.style.left = (ev.clientX - ox) + 'px'; win.style.top = (ev.clientY - oy) + 'px'; }
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', () => window.removeEventListener('mousemove', move), {once:true});
        }

        function initThree() {
            const scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('three-container').appendChild(renderer.domElement);
            const geo = new THREE.BufferGeometry(), count = 500, pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 10;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const p = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, color: 0x88ccff, transparent: true, opacity: 0.4 }));
            scene.add(p); camera.position.z = 5;
            function anim() { requestAnimationFrame(anim); p.rotation.y += 0.001; renderer.render(scene, camera); }
            anim();
        }

        shuffleIcons();
        runBoot();
        initThree();
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
