<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahmudul Hasan - Windows XP Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ============================================
           AUTHENTIC WINDOWS XP LUNA THEME
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        :root {
            --xp-title-blue: #245DDA;
            --xp-title-blue-dark: #1A4AC0;
            --xp-title-blue-darker: #103090;
            --xp-taskbar-blue: #245DDA;
            --xp-taskbar-gradient: linear-gradient(180deg, #316AC5 0%, #245DDA 50%, #1A4AC0 100%);
            --xp-start-green: #388E3C;
            --xp-start-green-light: #4CAF50;
            --xp-start-green-dark: #2E7D32;
            --xp-selection: #316AC5;
            --xp-window-bg: #FFFFFF;
            --xp-dialog-bg: #ECE9D8;
            --xp-border-light: #FFFFFF;
            --xp-border-dark: #0D1F5C;
            --xp-gray: #808080;
            --xp-gray-light: #E8E8E8;
            --xp-gray-dark: #A0A0A0;
            --xp-green-felt: #228B22;
        }
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; font-size: 11px; overflow: hidden; background: #000; height: 100vh; width: 100vw; }

        /* ============================================
           BOOT SEQUENCE
           ============================================ */
        #boot-sequence { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #boot-sequence.hidden { display: none; }
        #bios-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #245DDA; font-family: 'Courier New', monospace; font-size: 14px; padding: 30px; line-height: 1.6; }
        #bios-screen.hidden { display: none; }
        .bios-line { opacity: 0; animation: biosFadeIn 0.05s forwards; }
        @keyframes biosFadeIn { to { opacity: 1; } }
        #xp-loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #003399 0%, #000066 100%); display: none; flex-direction: column; justify-content: center; align-items: center; }
        #xp-loading.visible { display: flex; }
        #xp-logo { width: 300px; height: 180px; position: relative; margin-bottom: 40px; }
        .xp-logo-img { width: 100%; height: 100%; }
        #xp-loading-bar-container { width: 400px; height: 10px; background: #000; border-radius: 5px; overflow: hidden; border: 1px solid #666; }
        #xp-loading-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #316AC5, #5A9CFF, #316AC5); background-size: 200% 100%; animation: loadingShimmer 1s linear infinite; }
        @keyframes loadingShimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
        #loading-text { color: #fff; font-size: 12px; margin-top: 15px; font-family: 'Tahoma', sans-serif; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* ============================================
           DESKTOP CONTAINER
           ============================================ */
        #desktop-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        #three-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #desktop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: url('user_input_files/bliss.jpg') no-repeat center center; background-size: cover; }

        /* ============================================
           DESKTOP ICONS
           ============================================ */
        .desktop-icons { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; flex-wrap: wrap; height: calc(100% - 60px); align-content: flex-start; }
        .desktop-icon { width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 5px; border: 1px solid transparent; border-radius: 3px; position: relative; }
        .desktop-icon:hover { background: rgba(49, 106, 197, 0.3); border: 1px dotted #245DDA; }
        .desktop-icon.selected { background: rgba(49, 106, 197, 0.5); border: 1px dotted #fff; }
        .desktop-icon-img { width: 48px; height: 48px; image-rendering: pixelated; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.5)); transition: transform 0.1s; }
        .desktop-icon:hover .desktop-icon-img { transform: scale(1.05); }
        .desktop-icon-label { color: #fff; font-size: 11px; text-align: center; margin-top: 5px; text-shadow: 1px 1px 1px #000, -1px -1px 1px #000, 1px -1px 1px #000, -1px 1px 1px #000; max-width: 70px; word-wrap: break-word; line-height: 1.2; }
        .desktop-icon .badge { position: absolute; top: -5px; right: 5px; background: #e80000; color: #fff; font-size: 9px; padding: 1px 4px; border-radius: 3px; display: none; }

        /* ============================================
           TASKBAR
           ============================================ */
        #taskbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 35px; background: linear-gradient(180deg, #316AC5 0%, #245DDA 50%, #1A4AC0 100%); z-index: 10000; display: flex; align-items: center; padding: 0 5px; border-top: 1px solid #5A9CFF; }
        #start-button { display: flex; align-items: center; gap: 5px; padding: 3px 8px; background: linear-gradient(180deg, #4CAF50 0%, #388E3C 50%, #2E7D32 100%); border: 2px outset #8BC34A; cursor: pointer; margin-right: 10px; }
        #start-button:hover { filter: brightness(1.1); }
        #start-button:active { border-style: inset; }
        #start-button img { width: 18px; height: 18px; }
        #start-button span { color: #fff; font-weight: bold; font-size: 12px; text-shadow: 1px 1px 1px #000; }
        .quick-launch { display: flex; gap: 3px; margin-right: 10px; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.3); }
        .quick-launch-icon { width: 22px; height: 22px; background: rgba(255,255,255,0.1); border: 1px outset rgba(255,255,255,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .quick-launch-icon:hover { background: rgba(255,255,255,0.2); }
        .quick-launch-icon img { width: 16px; height: 16px; }
        #taskbar-windows { flex: 1; display: flex; gap: 3px; overflow: hidden; }
        .taskbar-window { display: flex; align-items: center; gap: 5px; padding: 2px 8px; background: linear-gradient(180deg, #7695DE 0%, #5A7AD5 50%, #4A6AC5 100%); border: 1px outset #9BB6E8; cursor: pointer; max-width: 180px; min-width: 80px; }
        .taskbar-window:hover { filter: brightness(1.05); }
        .taskbar-window.active { background: linear-gradient(180deg, #245DDA 0%, #1A4AC0 100%); border: 1px inset #5A9CFF; }
        .taskbar-window-icon { width: 16px; height: 16px; }
        .taskbar-window-title { color: #000; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .taskbar-window.active .taskbar-window-title { color: #fff; text-shadow: 1px 1px 1px #000; }
        #system-tray { display: flex; align-items: center; gap: 10px; padding: 0 10px; background: linear-gradient(180deg, #1A4AC0 0%, #103090 100%); border-left: 1px solid #5A9CFF; height: 100%; }
        .tray-icon { width: 16px; height: 16px; cursor: pointer; opacity: 0.9; }
        #clock { color: #fff; font-size: 11px; text-shadow: 1px 1px 1px #000; padding: 3px 8px; background: rgba(0,0,0,0.2); border-radius: 3px; }

        /* ============================================
           START MENU
           ============================================ */
        #start-menu { position: absolute; bottom: 35px; left: 0; width: 400px; background: linear-gradient(180deg, #316AC5 0%, #245DDA 50%, #1A4AC0 100%); z-index: 10001; display: none; border: 2px outset #5A9CFF; box-shadow: 2px -2px 10px rgba(0,0,0,0.3); }
        #start-menu.visible { display: block; }
        .start-menu-header { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: linear-gradient(90deg, #1A4AC0, #245DDA); border-bottom: 1px solid #103090; }
        .user-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #4CAF50, #2E7D32); border: 2px outset #8BC34A; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: bold; }
        .user-name { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 1px #000; }
        .start-menu-body { display: flex; }
        .start-menu-left { width: 190px; padding: 10px 5px; background: linear-gradient(180deg, #245DDA, #1A4AC0); }
        .start-menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; cursor: pointer; border: 1px solid transparent; margin-bottom: 2px; }
        .start-menu-item:hover { background: rgba(255,255,255,0.15); border: 1px dotted #9BB6E8; }
        .start-menu-item-icon { width: 32px; height: 32px; }
        .start-menu-item-text { color: #fff; font-size: 11px; }
        .start-menu-right { width: 210px; padding: 10px; background: #ECE9D8; border-left: 1px solid #A0A0A0; }
        .start-menu-section { margin-bottom: 15px; }
        .start-menu-section-title { color: #808080; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; padding-left: 5px; }
        .start-menu-link { display: flex; align-items: center; gap: 8px; padding: 5px 8px; cursor: pointer; color: #000; font-size: 11px; }
        .start-menu-link:hover { background: var(--xp-selection); color: #fff; }
        .start-menu-link-icon { width: 20px; height: 20px; }
        .start-menu-divider { height: 1px; background: #A0A0A0; margin: 5px 0; }
        .shut-down-btn { display: flex; align-items: center; gap: 8px; padding: 5px 8px; cursor: pointer; color: #000; font-size: 11px; background: linear-gradient(180deg, #ECE9D8, #D5D0C0); border: 1px outset #fff; }
        .shut-down-btn:hover { background: linear-gradient(180deg, #D5D0C0, #C5C0B0); }
        .shut-down-btn img { width: 20px; height: 20px; }

        /* ============================================
           WINDOWS
           ============================================ */
        .window { position: absolute; background: #ECE9D8; border: 3px outset #fff; box-shadow: 3px 3px 15px rgba(0,0,0,0.4); display: none; flex-direction: column; min-width: 200px; min-height: 150px; }
        .window.visible { display: flex; }
        .window-header { display: flex; align-items: center; justify-content: space-between; padding: 3px 5px; background: linear-gradient(180deg, #245DDA, #1A4AC0); cursor: move; }
        .window-header.inactive { background: linear-gradient(180deg, #7695DE, #5A7AD5); }
        .window-title { display: flex; align-items: center; gap: 5px; color: #fff; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 1px #000; }
        .window-title-icon { width: 16px; height: 16px; }
        .window-controls { display: flex; gap: 2px; }
        .window-btn { width: 21px; height: 21px; background: linear-gradient(180deg, #ECE9D8, #C5C0B0); border: 1px outset #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; color: #000; }
        .window-btn:hover { filter: brightness(1.1); }
        .window-btn:active { border-style: inset; }
        .window-btn-close { background: linear-gradient(180deg, #FF6B6B, #E53935); color: #fff; }
        .window-btn-close:hover { background: linear-gradient(180deg, #FF8A80, #EF5350); }
        .window-menu { display: flex; background: #ECE9D8; border-bottom: 1px solid #A0A0A0; padding: 2px 5px; }
        .window-menu-item { padding: 2px 8px; cursor: pointer; color: #000; font-size: 11px; }
        .window-menu-item:hover { background: var(--xp-selection); color: #fff; }
        .window-body { flex: 1; overflow: auto; background: #fff; position: relative; }
        .window-statusbar { display: flex; align-items: center; padding: 2px 5px; background: #ECE9D8; border-top: 1px inset #A0A0A0; font-size: 10px; color: #808080; }

        /* ============================================
           SHUTDOWN EFFECT
           ============================================ */
        #shutdown-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999998; display: none; opacity: 0; transition: opacity 0.5s; }
        #shutdown-overlay.active { display: block; opacity: 1; }
        .crt-shutdown { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.8) 100%); animation: crtFade 2s forwards; }
        @keyframes crtFade { 0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        /* ============================================
           ABOUT ME WINDOW CONTENT
           ============================================ */
        .about-container { display: flex; height: 100%; }
        .about-sidebar { width: 180px; background: linear-gradient(180deg, #316AC5, #245DDA); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .about-avatar-large { width: 100px; height: 100px; background: linear-gradient(135deg, #4CAF50, #2E7D32); border: 3px outset #8BC34A; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #fff; font-weight: bold; margin-bottom: 15px; }
        .about-name { color: #fff; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 5px; text-shadow: 1px 1px 1px #000; }
        .about-title { color: #9BB6E8; font-size: 10px; text-align: center; }
        .about-main { flex: 1; padding: 20px; overflow-y: auto; }
        .about-section { margin-bottom: 20px; }
        .about-section-title { font-size: 14px; font-weight: bold; color: #245DDA; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #245DDA; }
        .about-skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .about-skill-tag { background: linear-gradient(180deg, #E8F5E9, #C8E6C9); border: 1px solid #4CAF50; padding: 5px 10px; border-radius: 3px; font-size: 10px; color: #2E7D32; text-align: center; }
        .about-status { display: flex; align-items: center; gap: 8px; padding: 10px; background: #E8F5E9; border: 1px solid #4CAF50; border-radius: 5px; }
        .status-dot { width: 10px; height: 10px; background: #4CAF50; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .about-timeline { position: relative; padding-left: 20px; }
        .about-timeline::before { content: ''; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: #245DDA; }
        .timeline-item { position: relative; margin-bottom: 15px; padding-left: 15px; }
        .timeline-item::before { content: ''; position: absolute; left: -17px; top: 3px; width: 10px; height: 10px; background: #4CAF50; border: 2px solid #245DDA; border-radius: 50%; }
        .timeline-year { font-weight: bold; color: #245DDA; font-size: 11px; }
        .timeline-desc { color: #666; font-size: 10px; margin-top: 3px; }

        /* ============================================
           RECYCLE BIN / EXPLORER
           ============================================ */
        .explorer-container { display: flex; height: 100%; }
        .explorer-sidebar { width: 180px; background: linear-gradient(180deg, #7695DE, #5A7AD5); padding: 10px; }
        .explorer-folder-tree { color: #fff; font-size: 11px; }
        .explorer-folder { padding: 5px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .explorer-folder:hover { background: rgba(255,255,255,0.2); }
        .explorer-folder-icon { width: 16px; height: 16px; }
        .explorer-main { flex: 1; padding: 10px; background: #fff; }
        .explorer-toolbar { display: flex; gap: 5px; padding: 5px; background: #ECE9D8; border-bottom: 1px solid #A0A0A0; margin: -10px -10px 10px -10px; }
        .explorer-toolbar-btn { padding: 3px 8px; background: transparent; border: none; cursor: pointer; font-size: 10px; display: flex; align-items: center; gap: 3px; }
        .explorer-toolbar-btn:hover { background: var(--xp-selection); color: #fff; }
        .explorer-files { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; padding: 10px; }
        .explorer-file { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 5px; }
        .explorer-file:hover { background: rgba(49, 106, 197, 0.2); }
        .explorer-file-icon { width: 48px; height: 48px; }
        .explorer-file-name { color: #000; font-size: 10px; text-align: center; margin-top: 5px; max-width: 75px; word-wrap: break-word; }

        /* ============================================
           TERMINAL / CMD WINDOW
           ============================================ */
        .cmd-container { background: #000; color: #fff; font-family: 'Courier New', monospace; font-size: 13px; padding: 10px; height: 100%; overflow-y: auto; }
        .cmd-line { margin-bottom: 5px; display: flex; flex-wrap: wrap; }
        .cmd-prompt { color: #fff; margin-right: 8px; }
        .cmd-input { background: transparent; border: none; color: #fff; font-family: inherit; font-size: inherit; outline: none; flex: 1; }
        .cmd-output { color: #fff; white-space: pre-wrap; margin-bottom: 10px; }
        .cmd-output.error { color: #FF6B6B; }
        .cmd-output.success { color: #4CAF50; }
        .cmd-output.info { color: #5A9CFF; }

        /* ============================================
           BROWSER WINDOW
           ============================================ */
        .browser-toolbar { display: flex; align-items: center; gap: 5px; padding: 5px; background: #ECE9D8; border-bottom: 1px solid #A0A0A0; }
        .browser-back, .browser-forward { width: 25px; height: 25px; background: linear-gradient(180deg, #ECE9D8, #C5C0B0); border: 1px outset #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .browser-address { flex: 1; padding: 3px 8px; border: 1px inset #A0A0A0; font-size: 11px; }
        .browser-go { padding: 3px 10px; background: linear-gradient(180deg, #ECE9D8, #C5C0B0); border: 1px outset #fff; cursor: pointer; font-size: 11px; }
        .browser-content { flex: 1; background: #fff; overflow: auto; }

        /* ============================================
           MOBILE SIMULATOR
           ============================================ */
        .phone-simulator { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #1a1a1a; height: 100%; overflow: auto; }
        .phone-frame { position: relative; background: #000; border-radius: 30px; padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .phone-frame.iphone { border: 3px solid #333; }
        .phone-frame.android { border: 3px solid #444; }
        .phone-notch { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 80px; height: 20px; background: #000; border-radius: 10px; z-index: 10; }
        .phone-screen { width: 200px; height: 380px; background: #fff; border-radius: 20px; overflow: hidden; position: relative; }
        .phone-screen-content { width: 100%; height: 100%; overflow: auto; }

        /* ============================================
           SKILL RESUME WINDOW
           ============================================ */
        .skill-resume-container { padding: 20px; height: 100%; overflow: auto; background: linear-gradient(180deg, #fff, #f5f5f5); }
        .skill-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--xp-title-blue); }
        .skill-logo-large { width: 60px; height: 60px; }
        .skill-title { font-size: 20px; font-weight: bold; color: var(--xp-title-blue); }
        .skill-subtitle { font-size: 12px; color: #666; }
        .skill-level-bar { margin-bottom: 20px; }
        .skill-level-label { font-size: 11px; color: #666; margin-bottom: 5px; }
        .skill-level-track { height: 20px; background: #E8E8E8; border: 1px inset #A0A0A0; border-radius: 10px; overflow: hidden; }
        .skill-level-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); border-radius: 10px; }
        .skill-topics { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .skill-topic { background: #E8F5E9; border: 1px solid #4CAF50; padding: 5px 12px; border-radius: 15px; font-size: 11px; color: #2E7D32; }
        .skill-projects { margin-top: 20px; }
        .skill-projects-title { font-size: 14px; font-weight: bold; color: var(--xp-title-blue); margin-bottom: 10px; }
        .skill-project { padding: 10px; background: #f9f9f9; border: 1px solid #E0E0E0; margin-bottom: 10px; border-radius: 5px; }
        .skill-project-name { font-weight: bold; font-size: 12px; color: #333; }
        .skill-project-desc { font-size: 10px; color: #666; margin-top: 5px; }

        /* ============================================
           MY PROJECTS WINDOW
           ============================================ */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px; }
        .project-card { display: flex; flex-direction: column; align-items: center; padding: 15px; background: #f9f9f9; border: 1px solid #E0E0E0; cursor: pointer; transition: all 0.2s; }
        .project-card:hover { background: #E8F5E9; border-color: #4CAF50; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .project-icon { width: 48px; height: 48px; margin-bottom: 10px; }
        .project-name { font-size: 11px; font-weight: bold; color: #333; text-align: center; }
        .project-desc { font-size: 9px; color: #666; text-align: center; margin-top: 5px; }

        /* ============================================
           NOTEPAD WINDOW
           ============================================ */
        .notepad-container { display: flex; flex-direction: column; height: 100%; }
        .notepad-toolbar { display: flex; gap: 10px; padding: 5px; background: #ECE9D8; border-bottom: 1px solid #A0A0A0; font-size: 10px; }
        .notepad-toolbar-item { padding: 2px 5px; cursor: pointer; }
        .notepad-toolbar-item:hover { background: var(--xp-selection); color: #fff; }
        .notepad-content { flex: 1; padding: 10px; font-family: 'Courier New', monospace; font-size: 12px; background: #fff; color: #000; border: none; resize: none; outline: none; line-height: 1.5; }

        /* ============================================
           WELCOME SCREEN
           ============================================ */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #003399, #000066); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #welcome-screen.visible { display: flex; }
        #welcome-screen.hidden { display: none; }
        .welcome-user { display: flex; align-items: center; gap: 15px; padding: 20px 40px; background: linear-gradient(180deg, #7695DE, #5A7AD5); border: 2px outset #9BB6E8; cursor: pointer; margin-bottom: 30px; }
        .welcome-user:hover { filter: brightness(1.1); }
        .welcome-avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #4CAF50, #2E7D32); border: 2px outset #8BC34A; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #fff; font-weight: bold; }
        .welcome-name { color: #fff; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 1px #000; }
        .welcome-hint { color: #9BB6E8; font-size: 12px; }

        /* ============================================
           THREE.JS CRT EFFECT
           ============================================ */

        function makeIconsDraggable() {
            const icons = document.querySelectorAll('.desktop-icon');
            icons.forEach(icon => {
                let isDragging = false;
                let startX, startY, initialX, initialY;

                icon.onmousedown = (e) => {
                    if (e.button !== 0) return;
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    initialX = icon.offsetLeft;
                    initialY = icon.offsetTop;
                    icon.style.zIndex = 1000;
                };

                document.onmousemove = (e) => {
                    if (!isDragging) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    icon.style.left = `${Math.max(0, initialX + dx)}px`;
                    icon.style.top = `${Math.max(0, initialY + dy)}px`;
                };

                document.onmouseup = () => {
                    isDragging = false;
                };
            });

                'Starting Windows XP...'
            ];

            for (const line of biosLines) {
                const p = document.createElement('div');
                p.className = 'bios-line';
                p.textContent = line;
                biosScreen.appendChild(p);
                await sleep(100);
            }

            await sleep(1000);
            biosScreen.classList.add('hidden');
            document.getElementById('xp-loading').classList.add('visible');

            const loadingBar = document.getElementById('xp-loading-bar');
            for (let i = 0; i <= 100; i += 2) {
                loadingBar.style.width = i + '%';
                await sleep(30);
            }

            await sleep(500);
            document.getElementById('boot-sequence').classList.add('hidden');
            document.getElementById('welcome-screen').classList.add('visible');

        // ============================================

        // ============================================
        function createWindow(id, title, width, height, contentFn) {
            if (windows[id]) {
                focusWindow(id);
                return;
            }

            const zIndex = ++windowZIndex;
            const win = document.createElement('div');
            win.className = 'window';
            win.id = `window-${id}`;
            win.style.width = width + 'px';
            win.style.height = height + 'px';
            win.style.left = 100 + (Object.keys(windows).length * 30) + 'px';
            win.style.top = 50 + (Object.keys(windows).length * 30) + 'px';
            win.style.zIndex = zIndex;

            const iconSvg = getWindowIcon(id);

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <div class="window-title">
                        <span class="window-title-icon">${iconSvg}</span>
                        <span>${title}</span>
                    </div>
                    <div class="window-controls">
                        <div class="window-btn" onclick="minimizeWindow('${id}')">_</div>
                        <div class="window-btn" onclick="maximizeWindow('${id}')">□</div>
                        <div class="window-btn window-btn-close" onclick="closeWindow('${id}')">X</div>
                    </div>
                </div>
                <div class="window-body" id="window-body-${id}"></div>
            `;

            document.getElementById('windows-container').appendChild(win);
            windows[id] = win;

            const body = document.getElementById(`window-body-${id}`);
            contentFn(body);

            win.style.display = 'flex';
            activeWindowId = id;
            updateTaskbar(id);
            closeStartMenu();
        }

            const iconMap = {
                'about': createComputerIcon(),

                'laravel': createLaravelIcon(),

            };
            return iconMap[id] || iconMap['about'];
        }

        function focusWindow(id) {
            const win = windows[id];
            if (!win) return;

            win.style.zIndex = ++windowZIndex;
            win.querySelector('.window-header').classList.remove('inactive');

            Object.keys(windows).forEach(key => {
                if (key !== id && windows[key]) {
                    windows[key].querySelector('.window-header').classList.add('inactive');
                }
            });

            activeWindowId = id;
            document.querySelectorAll('.taskbar-window').forEach(tw => tw.classList.remove('active'));
            document.getElementById(`taskbar-${id}`)?.classList.add('active');
        }

        function closeWindow(id) {
            const win = windows[id];
            if (win) {
                win.remove();
                delete windows[id];
                document.getElementById(`taskbar-${id}`)?.remove();

                if (activeWindowId === id) {
                    activeWindowId = null;
                }
            }
        }

        function minimizeWindow(id) {
            const win = windows[id];
            if (win) {
                win.style.display = 'none';
                document.getElementById(`taskbar-${id}`)?.classList.remove('active');
            }
        }

        function maximizeWindow(id) {
            const win = windows[id];
            if (win) {
                if (win.dataset.maximized === 'true') {
                    win.style.width = win.dataset.prevWidth;
                    win.style.height = win.dataset.prevHeight;
                    win.style.left = win.dataset.prevLeft;
                    win.style.top = win.dataset.prevTop;
                    win.dataset.maximized = 'false';
                } else {
                    win.dataset.prevWidth = win.style.width;
                    win.dataset.prevHeight = win.style.height;
                    win.dataset.prevLeft = win.style.left;
                    win.dataset.prevTop = win.style.top;
                    win.style.width = '100%';
                    win.style.height = 'calc(100% - 35px)';
                    win.style.left = '0';
                    win.style.top = '0';
                    win.dataset.maximized = 'true';
                }
            }
        }

        function updateTaskbar(id) {
            const taskbar = document.getElementById('taskbar-windows');
            const existing = document.getElementById(`taskbar-${id}`);
            if (existing) return;

            const tab = document.createElement('div');
            tab.className = 'taskbar-window active';
            tab.id = `taskbar-${id}`;
            tab.innerHTML = `
                <span class="taskbar-window-icon">${getWindowIcon(id)}</span>
                <span class="taskbar-window-title">${getWindowTitle(id)}</span>
            `;
            tab.onclick = () => {
                const win = windows[id];
                if (win.style.display === 'none') {
                    win.style.display = 'flex';
                    focusWindow(id);
                } else if (activeWindowId === id) {
                    minimizeWindow(id);
                } else {
                    focusWindow(id);
                }
            };
            taskbar.appendChild(tab);
        }

        // ============================================
        // DRAG FUNCTIONALITY
        // ============================================
        function startDrag(e, id) {
            if (e.target.classList.contains('window-btn')) return;
            focusWindow(id);

            const win = windows[id];
            const rect = win.getBoundingClientRect();

            dragState = {
                isDragging: true,
                windowId: id,
                offsetX: e.clientX - rect.left,
                offsetY: e.clientY - rect.top
            };
        }

        document.addEventListener('mousemove', (e) => {
            if (!dragState.isDragging) return;
            const win = windows[dragState.windowId];
            if (!win || win.dataset.maximized === 'true') return;

            let x = e.clientX - dragState.offsetX;
            let y = e.clientY - dragState.offsetY;

            win.style.left = x + 'px';
            win.style.top = y + 'px';
        });

        document.addEventListener('mouseup', () => {
            dragState.isDragging = false;
        });

            }, 1500);

        // ============================================
        // THREE.JS CRT EFFECT
        // ============================================
        function initThreeJS() {
            const container = document.getElementById('three-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Create particles
            const particlesGeometry = new THREE.BufferGeometry();
            const particleCount = 500;
            const posArray = new Float32Array(particleCount * 3);

            for(let i = 0; i < particleCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 10;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.02,
                color: 0x88ccff,
                transparent: true,
                opacity: 0.3
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            camera.position.z = 3;

            function animate() {
                requestAnimationFrame(animate);
                particlesMesh.rotation.y += 0.0005;
                particlesMesh.rotation.x += 0.0002;
                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Initialize
        init();
    </script>
